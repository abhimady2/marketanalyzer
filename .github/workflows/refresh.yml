name: Refresh analyzer
# Free continuous refresh on Vercel Hobby (whose native cron is daily-only).
# Requires two repo secrets: ANALYZER_URL (e.g. https://your-app.vercel.app) and CRON_SECRET.
on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Recompute verdict
        run: |
          curl -fsS -m 60 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.ANALYZER_URL }}/api/cron/analyze" || true
